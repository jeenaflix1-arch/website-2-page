<title>Jeenaflix Player</title>
<style>
  *{box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{margin:0;background:#0b0b0f;color:#fff;font-family:system-ui,-apple-system,sans-serif}
  .wrap{max-width:960px;margin:0 auto;width:100%;height:100dvh;display:flex;flex-direction:column}
  .sticky-header{flex-shrink:0;background:#0b0b0f;z-index:100;padding:0 12px 8px}

  .brand-row{position:relative;display:flex;align-items:center;justify-content:flex-start;gap:12px;padding:0;min-height:72px}
  .brand{display:flex;align-items:center;gap:12px;font-weight:700;font-size:28px;letter-spacing:.5px;color:#fff}
  .brand .flix{color:#e50914}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:#e50914;box-shadow:0 0 12px #e50914}
  .brand img{height:72px;width:72px;object-fit:contain;background:transparent;padding:0;margin:0;display:block}

  .socials{position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .socials .icon-row{display:flex;align-items:center;gap:6px}
  .follow-btn{font-size:11px;font-weight:700;letter-spacing:.5px;color:#fff;background:#e50914;padding:4px 16px;border-radius:14px;text-decoration:none;box-shadow:0 0 8px rgba(229,9,20,.6);animation:blinker 1.5s linear infinite}
  .socials .icon-row a{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.08);color:#fff;text-decoration:none;transition:.2s;border:1px solid rgba(255,255,255,.1)}
  .socials .icon-row a:hover{background:#e50914;border-color:#e50914;transform:scale(1.1)}
  .socials svg{width:15px;height:15px;fill:currentColor}

  .coming-soon{width:100%;text-align:center;font-size:13px;color:#e50914;background:rgba(229,9,20,.1);padding:4px 8px;border-radius:4px;border:1px solid rgba(229,9,20,.3);margin-top:6px;animation:blinker 1.5s linear infinite}
  @keyframes blinker{50%{opacity:.3}}

  .box{background:#000;border-radius:12px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.06);width:100%;max-width:100%}

  /* Fixed player wrapper — prevents right-side cutoff */
  .iframe-container{position:relative;width:100%;padding-bottom:56.25%;background:#000;overflow:hidden}
  .iframe-container iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}

  .ticker-row{display:flex;align-items:center;gap:10px;background:#111116;border-top:1px solid rgba(255,255,255,.1);padding:8px 12px;font-size:14px;overflow:hidden}
  .live{background:#e50914;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase}
  .ticker{flex:1;overflow:hidden;white-space:nowrap}
  .ticker span{display:inline-block;padding-left:100%;animation:ticker 40s linear infinite;color:rgba(255,255,255,.8)}
  @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

  .now{padding:14px 4px 6px;font-size:13px;color:#bbb}
  .now b{color:#fff}

  .tabs-container{margin:14px 0 0;display:flex;overflow-x:auto;white-space:nowrap;scrollbar-width:none;gap:8px;padding:0 4px}
  .tabs-container::-webkit-scrollbar{display:none}
  .tab{background:transparent;border:1px solid rgba(255,255,255,.2);color:#ccc;padding:8px 18px;border-radius:20px;cursor:pointer;font-size:13px;outline:none;transition:.2s;flex-shrink:0}
  .tab.active{background:#fff;color:#000;border-color:#fff;font-weight:700}
  .tab:hover:not(.active){background:rgba(255,255,255,.1)}

  .channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:16px;justify-items:center;padding:16px 12px 20px;flex:1;min-height:0;overflow-y:auto;align-content:start;scrollbar-width:thin}
  .channel-wrap{display:flex;flex-direction:column;align-items:center}
  .channel-item{width:72px;height:72px;border-radius:50%;border:2px solid #222;background:#1a1a24;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;position:relative}
  .channel-item:hover{border-color:#e50914;transform:scale(1.08)}
  .channel-item.active{border-color:#e50914;box-shadow:0 0 14px rgba(229,9,20,.55)}
  .channel-item img{width:100%;height:100%;object-fit:contain;padding:6px;background:#fff}
  .channel-name{font-size:10px;text-align:center;margin-top:4px;color:#aaa;width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>

const grid = document.getElementById('grid');
const nowPlaying = document.getElementById('nowPlaying');
let currentCat = 'all';
let currentUrl = '';

function play(url, name){
  currentUrl = url;
  nowPlaying.textContent = name;

  const oldPlayer = document.getElementById('player');
  const newPlayer = document.createElement('iframe');
  newPlayer.id = 'player';
  const sep = url.includes('?') ? '&' : '?';
  newPlayer.src = url + sep + 'autoplay=1&auto_play=true&mute=0';
  newPlayer.setAttribute('allow', 'autoplay; encrypted-media; fullscreen; picture-in-picture');
  newPlayer.setAttribute('allowfullscreen', 'true');
  oldPlayer.parentNode.replaceChild(newPlayer, oldPlayer);

  document.querySelectorAll('.channel-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.url===url);
  });
}

function render(){
  grid.innerHTML = '';
  const list = currentCat==='all' ? CHANNELS : CHANNELS.filter(c=>c.cat===currentCat);
  list.forEach(c=>{
    const wrap = document.createElement('div');
    wrap.className='channel-wrap';
    const el = document.createElement('div');
    el.className='channel-item';
    el.dataset.url = c.url;
    if(c.url===currentUrl) el.classList.add('active');
    el.innerHTML = `<img src="${c.logo}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'">`;
    el.addEventListener('click', () => { play(c.url, c.name); });
    const nm = document.createElement('div');
    nm.className='channel-name';
    nm.textContent = c.name;
    wrap.appendChild(el);
    wrap.appendChild(nm);
    grid.appendChild(wrap);
  });
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    currentCat = t.dataset.cat;
    render();
  });
});

// آٹو پلے ہٹانے کے لیے نیچے والی لائن کو نکال دیا گیا ہے:
// if(CHANNELS.length){ play(CHANNELS[0].url, CHANNELS[0].name); }

render();

// بیک گراؤنڈ پلے بیک روکنے کے لیے Visibility ایونٹ
document.addEventListener("visibilitychange", () => {
  const player = document.getElementById('player');
  if (document.hidden) {
    // جب یوزر براؤزر منیمائز کرے تو ویڈیو کا سورس کلیئر کر دیں
    if (player.src) {
      player.setAttribute('data-src', player.src);
      player.src = '';
    }
  } else {
    // جب یوزر واپس آئے تو دوبارہ وہیں سے پلے کر دیں
    const savedSrc = player.getAttribute('data-src');
    if (savedSrc) {
      player.src = savedSrc;
    }
  }
});
