<title>Jeenaflix Player</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0b0b0f;color:#fff;font-family:system-ui,-apple-system,sans-serif}
  .wrap{max-width:960px;margin:0 auto}
  .sticky-header{position:sticky;top:0;background:#0b0b0f;z-index:100;padding:12px 12px 14px}
  .brand{display:flex;align-items:center;gap:10px;padding:10px 4px;font-weight:700;font-size:20px;letter-spacing:.5px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:#e50914;box-shadow:0 0 12px #e50914}
  .box{background:#000;border-radius:12px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.06)}
  iframe{width:100%;aspect-ratio:16/9;background:#000;display:block;border:none}
  .ticker-row{display:flex;align-items:center;gap:10px;background:#111116;border-top:1px solid rgba(255,255,255,.1);padding:8px 12px;font-size:14px;overflow:hidden}
  .live{background:#e50914;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase}
  .ticker{flex:1;overflow:hidden;white-space:nowrap}
  .ticker span{display:inline-block;padding-left:100%;animation:ticker 40s linear infinite;color:rgba(255,255,255,.8)}
  @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
  .now{padding:14px 4px 6px;font-size:13px;color:#bbb}
  .now b{color:#fff}
  .tabs-container{margin:14px 0 0;display:flex;overflow-x:auto;white-space:nowrap;scrollbar-width:none;gap:8px}
  .tabs-container::-webkit-scrollbar{display:none}
  .tab{background:transparent;border:1px solid rgba(255,255,255,.2);color:#ccc;padding:8px 18px;border-radius:20px;cursor:pointer;font-size:13px;outline:none;transition:.2s;flex-shrink:0}
  .tab.active{background:#fff;color:#000;border-color:#fff;font-weight:700}
  .tab:hover:not(.active){background:rgba(255,255,255,.1)}
  .channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:16px;justify-items:center;padding:0 12px 20px}
  .channel-item{width:72px;height:72px;border-radius:50%;border:2px solid #222;background:#1a1a24;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;position:relative}
  .channel-item:hover{border-color:#e50914;transform:scale(1.08)}
  .channel-item.active{border-color:#e50914;box-shadow:0 0 14px rgba(229,9,20,.55)}
  .channel-item img{width:100%;height:100%;object-fit:contain;padding:6px;background:#fff}
  .channel-name{font-size:10px;text-align:center;margin-top:4px;color:#aaa;width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .channel-wrap{display:flex;flex-direction:column;align-items:center}
</style>

const grid = document.getElementById('grid');
const nowPlaying = document.getElementById('nowPlaying');
let currentCat = 'all';
let currentUrl = '';

function play(url, name){
  currentUrl = url;
  nowPlaying.textContent = name;
  
  // Iframe Replacement Trick for Autoplay (یہ ٹرک چینل کلک کرنے پر اسکرین ٹچ پاس کر کے پلے کرتی ہے)
  const oldPlayer = document.getElementById('player');
  const newPlayer = document.createElement('iframe');
  newPlayer.id = 'player';
  
  // آٹو پلے پیرامیٹرز شامل کیے گئے ہیں
  const sep = url.includes('?') ? '&' : '?';
  newPlayer.src = url + sep + 'autoplay=1&auto_play=true&mute=0';
  
  newPlayer.setAttribute('allow', 'autoplay; encrypted-media; fullscreen; picture-in-picture');
  newPlayer.setAttribute('allowfullscreen', 'true');
  
  // پرانے پلیئر کو نئے سے تبدیل کریں
  oldPlayer.parentNode.replaceChild(newPlayer, oldPlayer);

  document.querySelectorAll('.channel-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.url===url);
  });
}

function render(){
  grid.innerHTML = '';
  const list = currentCat==='all' ? CHANNELS : CHANNELS.filter(c=>c.cat===currentCat);
  list.forEach(c=>{
    const wrap = document.createElement('div');
    wrap.className='channel-wrap';
    const el = document.createElement('div');
    el.className='channel-item';
    el.dataset.url = c.url;
    if(c.url===currentUrl) el.classList.add('active');
    
    el.innerHTML = `<img src="${c.logo}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'">`;
    
    // یوزر جب چینل پر کلک/ٹچ کرے گا تو فنکشن چلے گا
    el.addEventListener('click', () => {
       play(c.url, c.name);
    });
    
    const nm = document.createElement('div');
    nm.className='channel-name';
    nm.textContent = c.name;
    wrap.appendChild(el);
    wrap.appendChild(nm);
    grid.appendChild(wrap);
  });
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    currentCat = t.dataset.cat;
    render();
  });
});

// Autoplay first channel on load
if(CHANNELS.length){
  play(CHANNELS[0].url, CHANNELS[0].name);
}
render();
</script>
